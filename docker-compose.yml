services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
    networks:
      - tuneguess

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - tuneguess

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      FRONTEND_URL: https://tuneguess.raphthln.ovh
      CORS_ORIGIN: https://tuneguess.raphthln.ovh
      REDIRECT_URI: https://tuneguess.raphthln.ovh/callback
      PORT: "5000"
    expose:
      - "5000"
    networks:
      - tuneguess

volumes:
  caddy_data:
  caddy_config:

networks:
  tuneguess:
    driver: bridge